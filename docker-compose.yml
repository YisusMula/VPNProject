version: "3.8"

# ============================================================
# WireGuard VPN Stack
# ============================================================
# Prerequisites:
#   - Docker ≥ 20.10 and Docker Compose v2
#   - Linux host with kernel ≥ 5.6 (WireGuard built-in) or
#     wireguard-tools + wireguard-dkms on older kernels
#   - UDP port ${WG_PORT} open in the server firewall
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d
# ============================================================

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    restart: unless-stopped

    environment:
      # Public hostname / IP that clients use to reach this server
      - WG_HOST=${WG_HOST}
      # UDP listen port (must match the host port mapping below)
      - WG_PORT=${WG_PORT:-51820}
      # Default DNS pushed to connecting clients
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-1.1.1.1,8.8.8.8}
      # Default client address pool
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS:-10.8.0.x}
      # Web-UI password (plaintext or bcrypt hash)
      - PASSWORD=${WG_EASY_PASSWORD:-changeme}
      # Allow traffic between peers (needed for site-to-site)
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
      # Keep-alive so NAT mappings stay alive (seconds)
      - WG_PERSISTENT_KEEPALIVE=25
      # Enable IP forwarding inside the container
      - WG_PRE_UP=sysctl -w net.ipv4.ip_forward=1 && sysctl -w net.ipv6.conf.all.forwarding=1
      # Masquerade outbound traffic so road-warriors reach the internet
      - WG_POST_UP=iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      - WG_POST_DOWN=iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

    volumes:
      # Persist WireGuard config and peer keys across container restarts
      - wg_data:/etc/wireguard

    ports:
      # WireGuard UDP tunnel
      - "${WG_PORT:-51820}:51820/udp"
      # wg-easy web UI (bind to localhost only; use a reverse-proxy for HTTPS in production)
      - "127.0.0.1:51821:51821/tcp"

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1

    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  wg_data:
    driver: local
